<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trust Issues — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent-dim: #00ff8833;
      --red: #ff4466;
      --text: #c8c8d8;
      --text-dim: #555566;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, #00ff8808 0%, transparent 70%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 40px;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .logo {
      font-family: var(--sans);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    input::placeholder { color: var(--text-dim); }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--accent);
      color: #000;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover  { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }

    .error {
      background: #ff446611;
      border: 1px solid var(--red);
      color: var(--red);
      font-size: 12px;
      padding: 10px 14px;
      margin-bottom: 20px;
    }

    .hint {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .hint span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">Trust Issues</div>
      <div class="subtitle">Employee Portal — Restricted Access</div>

      {% if error %}
        <div class="error">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="enter username" autocomplete="off" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="enter password" required />
        </div>
        <button class="btn" type="submit">Authenticate →</button>
      </form>

      <div class="hint">
        🔒 Access is role-based. <span>Admins only</span> can view sensitive data.<br/>
        Credentials: <span>player</span> / <span>password123</span>
      </div>
    </div>
  </div>
</body>
</html>
